<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Akka</title>

<style>

body{
margin:0;
font-family:cursive;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* intro */

#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
background:black;
animation:fadeout 3s forwards;
}

@keyframes fadeout{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* main text */

#mainText{
display:none;
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
}

.fadeIn{
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* gift */

#giftBox{
display:none;
margin-top:200px;
}

.gift{
width:150px;
height:150px;
background:red;
margin:auto;
border-radius:10px;
position:relative;
}

.lid{
width:150px;
height:40px;
background:#ff5c5c;
position:absolute;
top:-40px;
transition:1s;
}

.open .lid{
transform:translateY(-90px) rotate(-20deg);
}

/* popup */

#popup{
display:none;
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:10px;
font-size:25px;
}

/* gallery */

#gallery{
display:none;
position:absolute;
top:10%;
width:100%;
}

.photo{
width:300px;
border-radius:20px;
box-shadow:0 10px 30px black;
animation:fadeIn 2s;
}

</style>
</head>

<body>

<!-- intro -->

<div id="intro">
AKKA
</div>

<!-- main text -->

<div id="mainText">
Very Special Day For My Akka
</div>

<!-- gift -->

<div id="giftBox">

<div class="gift" id="gift">
<div class="lid"></div>
</div>

</div>

<!-- popup -->

<div id="popup">
🎉 Happy Birthday Akka 🎂
</div>

<!-- gallery -->

<div id="gallery">

<img id="photo" class="photo">

</div>

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

let images = [

"photo_2026-03-13_15-52-30.jpg",
"photo_2026-03-13_15-52-31.jpg",
"photo_2026-03-13_15-53-48.jpg",
"photo_2026-03-13_15-53-54.jpg",
"photo_2026-03-13_15-54-00.jpg",
"photo_2026-03-13_15-54-05.jpg",
"photo_2026-03-13_15-56-53.jpg",
"photo_2026-03-13_15-58-14.jpg"

]

let index = 0

setTimeout(()=>{

document.getElementById("mainText").style.display="block"

},3000)

setTimeout(()=>{

document.getElementById("mainText").style.display="none"
document.getElementById("giftBox").style.display="block"

},6000)

setTimeout(()=>{

document.getElementById("gift").classList.add("open")

},8000)

setTimeout(()=>{

document.getElementById("popup").style.display="block"

},10000)

setTimeout(()=>{

document.getElementById("popup").style.display="none"
document.getElementById("giftBox").style.display="none"
document.getElementById("gallery").style.display="block"

document.getElementById("music").play()

showImages()

},12000)

function showImages(){

document.getElementById("photo").src = images[index]

setInterval(()=>{

index++

if(index < images.length){

document.getElementById("photo").src = images[index]

}

},3000)

}

</script>

</body>
</html>
