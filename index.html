<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Birthday Akka</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#popup{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:55px;
color:#ff4d6d;
font-family:'Pacifico', cursive;
}

#date{
display:none;
font-size:40px;
margin-top:200px;
font-family:'Pacifico', cursive;
}

#gift{
display:none;
font-size:120px;
cursor:pointer;
margin-top:200px;
}

#main{
display:none;
}

h1{
margin-top:30px;
font-size:45px;
color:#ff4d6d;
font-family:'Pacifico', cursive;
}

img{
width:auto;
height:auto;
max-width:100%;
max-height:80vh;
display:block;
margin:auto;
border-radius:20px;
object-fit:contain;
}

</style>

</head>

<body>

<div id="popup">✨ Very Special Day For Akka ✨</div>

<div id="date">14 / 03 / 2026</div>

<div id="gift">🎁</div>

<div id="main">

<h1>🎂 Happy Birthday Akka 🎂</h1>

<img id="photo" src="photo_2026-03-13_15-52-30.jpg">

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

</div>

<script>

setTimeout(function(){

document.getElementById("popup").style.display="none";
document.getElementById("date").style.display="block";

},3000);

setTimeout(function(){

document.getElementById("date").style.display="none";
document.getElementById("gift").style.display="block";

},6000);

document.getElementById("gift").onclick=function(){

document.getElementById("gift").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("music").play();

};

let images=[
"photo_2026-03-13_15-52-30.jpg",
"photo_2026-03-13_15-52-31.jpg",
"photo_2026-03-13_15-53-48.jpg",
"photo_2026-03-13_15-53-54.jpg",
"photo_2026-03-13_15-54-00.jpg",
"photo_2026-03-13_15-54-05.jpg",
"photo_2026-03-13_15-56-53.jpg",
"photo_2026-03-13_15-58-14.jpg"
];

let i=0;

setInterval(function(){

i++;

if(i>=images.length){
i=0;
}

document.getElementById("photo").src=images[i];

},2000);

</script>

</body>

</html>
